<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pulse — In-Workout · Variations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { background: #0a0a0a; min-height: 100vh; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens/inworkout-variations.jsx"></script>
  <script type="text/babel">
    const { PhoneShell, InWorkoutCinematic, InWorkoutDataDense, InWorkoutCoachForward } = window.PulseInWorkoutVariations;
    const coach = window.PulseData.COACHES.ace;

    function App() {
      return (
        <DesignCanvas title="Pulse · In-workout — three directions">
          <DCSection id="inworkout" title="Mid-set screen — three directions">
            <DCArtboard id="cinematic" label="A · Cinematic" subtitle="Full-bleed video, minimal HUD, mood-driven" width={402} height={874}>
              <PhoneShell><InWorkoutCinematic coach={coach}/></PhoneShell>
            </DCArtboard>
            <DCArtboard id="datadense" label="B · Data-dense" subtitle="Pro-athlete dashboard with live metrics + set log" width={402} height={874}>
              <PhoneShell><InWorkoutDataDense coach={coach}/></PhoneShell>
            </DCArtboard>
            <DCArtboard id="coach" label="C · Coach-forward" subtitle="Big spoken cue, simple controls, calm focus" width={402} height={874}>
              <PhoneShell><InWorkoutCoachForward coach={coach}/></PhoneShell>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
