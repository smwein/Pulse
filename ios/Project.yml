name: PulseApp
options:
  bundleIdPrefix: co.simpleav.pulse
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.2.0"
packages:
  CoreModels:
    path: Packages/CoreModels
  DesignSystem:
    path: Packages/DesignSystem
  Persistence:
    path: Packages/Persistence
  Networking:
    path: Packages/Networking
  Repositories:
    path: Packages/Repositories
  AppShell:
    path: Packages/AppShell
  Onboarding:
    path: Packages/Features/Onboarding
  Home:
    path: Packages/Features/Home
  PlanGeneration:
    path: Packages/Features/PlanGeneration
  WorkoutDetail:
    path: Packages/Features/WorkoutDetail
  HealthKitClient:
    path: Packages/HealthKitClient
  InWorkout:
    path: Packages/Features/InWorkout
targets:
  PulseApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseApp
        excludes:
          - "Secrets.swift.template"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.simpleav.pulse
        INFOPLIST_FILE: PulseApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseApp/PulseApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: CoreModels
      - package: DesignSystem
      - package: Persistence
      - package: Networking
      - package: Repositories
      - package: AppShell
      - package: Onboarding
      - package: Home
      - package: PlanGeneration
      - package: WorkoutDetail
      - package: HealthKitClient
      - package: InWorkout
